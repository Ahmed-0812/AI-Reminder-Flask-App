<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            font-family: Arial;
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box img{
            width:140px;
            margin-bottom:20px;
        }

        .login-box h1{
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:12px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:12px;
            background:#6C63FF;
            color:white;
            font-size:16px;
        }

        a{
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="login-box">

    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

    <h1>Welcome Back 👋</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register">
        Create Account
    </a>

</div>

</body>
</html>
