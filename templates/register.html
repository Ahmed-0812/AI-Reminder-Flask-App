<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
            font-family:Arial;
        }

        .box{
            width:420px;
            background:white;
            border-radius:30px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        img{
            width:170px;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            margin-top:15px;
            border-radius:15px;
            border:1px solid #ddd;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            border:none;
            border-radius:15px;
            background:#ff6b81;
            color:white;
            font-weight:bold;
            font-size:16px;
        }

        button:hover{
            background:#ff4d6d;
        }

        a{
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="box">

    <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png">

    <h1>Create Account ✨</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login">
        Back to Login
    </a>

</div>

</body>
</html>
