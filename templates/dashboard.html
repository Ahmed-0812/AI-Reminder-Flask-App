<!DOCTYPE html>
<html>
<head>

    <title>Smart Reminder Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PWA MANIFEST -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- MOBILE SETTINGS -->
    <meta name="theme-color" content="#243B55">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#141E30,#243B55);
            color:white;
            overflow-x:hidden;
        }

        .main-container{
            width:90%;
            margin:auto;
            padding-top:40px;
        }

        .top-section{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .title-box h1{
            font-size:55px;
            font-weight:800;
        }

        .title-box p{
            font-size:20px;
            opacity:0.8;
            margin-top:10px;
        }

        .robot{
            width:250px;
            animation:float 3s ease-in-out infinite;
        }

        @keyframes float{
            0%{transform:translateY(0px);}
            50%{transform:translateY(-15px);}
            100%{transform:translateY(0px);}
        }

        .task-box{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:30px;
            padding:30px;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        .task-form{
            display:flex;
            gap:15px;
            margin-bottom:35px;
            flex-wrap:wrap;
        }

        .task-input{
            flex:1;
            border:none;
            outline:none;
            padding:18px;
            border-radius:18px;
            font-size:18px;
            min-width:220px;
        }

        .btn-add{
            border:none;
            padding:18px 28px;
            border-radius:18px;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            color:white;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
            cursor:pointer;
        }

        .btn-add:hover{
            transform:scale(1.05);
        }

        .section-title{
            margin-bottom:25px;
            font-size:30px;
            font-weight:700;
        }

        .task-card{
            background:rgba(255,255,255,0.12);
            border-radius:22px;
            padding:22px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:0.3s;
            box-shadow:0 6px 20px rgba(0,0,0,0.2);
        }

        .task-card:hover{
            transform:translateY(-5px);
        }

        .task-text{
            font-size:22px;
            font-weight:600;
        }

        .time-text{
            font-size:16px;
            opacity:0.8;
            margin-top:8px;
        }

        .delete-btn{
            text-decoration:none;
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
            padding:12px 22px;
            border-radius:14px;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .delete-btn:hover{
            transform:scale(1.05);
            color:white;
        }

    </style>

</head>

<body>

<div class="main-container">

    <div class="top-section">

        <div class="title-box">

            <h1>⏰ Smart Reminder Task Manager</h1>

            <p>
                Never forget your important tasks again 🚀
            </p>

        </div>

        <img class="robot"
        src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

    </div>

    <div class="task-box">

        <form method="POST" class="task-form">

            <input type="text"
                   name="task"
                   class="task-input"
                   placeholder="✨ What's your next mission?"
                   required>

            <input type="date"
                   name="reminder_date"
                   class="task-input"
                   required>

            <input type="time"
                   name="reminder_time"
                   class="task-input"
                   required>

            <div style="display:flex; gap:15px;">

                <button class="btn-add">
                    ➕ Add Reminder
                </button>

                <button type="button"
                        class="btn-add"
                        onclick="startVoice()">

                    🎤 Speak

                </button>

            </div>

        </form>

        <h2 class="section-title">
            🔔 Active Reminders
        </h2>

        {% for task in tasks %}

        <div class="task-card">

            <div>

                <div class="task-text">
                    ✅ {{ task.title }}
                </div>

                <div class="time-text">
                    📅 {{ task.reminder_date }}
                </div>

                <div class="time-text">
                    ⏰ {{ task.reminder_time }}
                </div>

            </div>

            <a href="/delete/{{ task.id }}"
               class="delete-btn">

               🗑 Delete

            </a>

        </div>

        {% endfor %}

    </div>

</div>

<script>

// ================= VOICE ASSISTANT =================

function startVoice(){

    const recognition =
    new(window.SpeechRecognition ||
        window.webkitSpeechRecognition)();

    recognition.lang = 'en-US';

    recognition.start();

    recognition.onresult = function(event){

        const text =
        event.results[0][0].transcript;

        document.querySelector(
        'input[name="task"]'
        ).value = text;

    };

}

// ================= NOTIFICATION PERMISSION =================

if (Notification.permission !== "granted") {

    Notification.requestPermission();

}

// ================= TASK DATA =================

const tasks = [

{% for task in tasks %}
{
    title: `{{ task.title }}`,
    date: `{{ task.reminder_date }}`,
    time: `{{ task.reminder_time }}`
},
{% endfor %}

];

// ================= BEEP SOUND =================

function playBeep(){

    const audioContext =
    new(window.AudioContext ||
        window.webkitAudioContext)();

    const oscillator =
    audioContext.createOscillator();

    const gainNode =
    audioContext.createGain();

    oscillator.connect(gainNode);

    gainNode.connect(audioContext.destination);

    oscillator.type = "sine";

    oscillator.frequency.value = 1000;

    gainNode.gain.value = 0.5;

    oscillator.start();

    setTimeout(() => {

        oscillator.stop();

    }, 1000);

}

// ================= ALARM CHECK =================

let alreadyTriggered = [];

setInterval(() => {

    const now = new Date();

    const currentDate =
    now.toISOString().split('T')[0];

   const currentTime =
now.getHours().toString().padStart(2,'0')
+ ":" +
now.getMinutes().toString().padStart(2,'0');

tasks.forEach(task => {

    console.log(
        "Checking:",
        task.time,
        currentTime
    );

    const uniqueId =
    task.title + task.date + task.time;

    if(
        task.date === currentDate &&
        task.time.trim() === currentTime &&
        !alreadyTriggered.includes(uniqueId)
    ){

        alreadyTriggered.push(uniqueId);

        // PLAY SOUND
        playBeep();

        // ALERT
        alert(
            "🔔 Reminder: " + task.title
        );

        // NOTIFICATION
        if(Notification.permission === "granted"){

            new Notification(
                "⏰ Reminder Alert!",
                {
                    body: task.title
                }
            );

        }

    }

});

}, 1000);

// ================= SERVICE WORKER =================

if ('serviceWorker' in navigator) {

    navigator.serviceWorker
    .register('/static/service-worker.js')

    .then(() => {

        console.log('PWA Ready');

    });

}

</script>

</body>
</html>
